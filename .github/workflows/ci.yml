name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]

    steps:
      - name: Check out source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install pinned development linter
        run: python -m pip install ruff==0.15.21

      - name: Lint and check formatting
        run: ruff check plugins scripts tests && ruff format --check plugins scripts tests

      - name: Compile and validate
        run: make compile validate

      - name: Run tests
        run: make test

      - name: Verify deterministic package
        run: make package package-repro-check

      - name: Inspect working tree
        run: git status --short --untracked-files=no
