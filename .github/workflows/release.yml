name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Verify and publish deterministic archive
    runs-on: ubuntu-latest

    steps:
      - name: Check out source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"

      - name: Install pinned development linter
        run: python -m pip install ruff==0.15.21

      - name: Verify release contract
        run: make release-contract TAG="${GITHUB_REF_NAME}"

      - name: Verify source and package
        run: |
          ruff check plugins scripts tests
          ruff format --check plugins scripts tests
          make check
          make package
          make package-repro-check

      - name: Verify release checksum
        working-directory: dist
        run: sha256sum --check "amanerp-second-opinion-${GITHUB_REF_NAME#v}.zip.sha256"

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version="${GITHUB_REF_NAME#v}"
          gh release create "${GITHUB_REF_NAME}" \
            "dist/amanerp-second-opinion-${version}.zip" \
            "dist/amanerp-second-opinion-${version}.zip.sha256" \
            --verify-tag \
            --generate-notes \
            --title "Second Opinion by AmanERP ${GITHUB_REF_NAME}"
